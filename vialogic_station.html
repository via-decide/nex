<!doctype html><html><head><meta charset="utf-8"><title>ViaLogic Station</title><style>body{font-family:system-ui;background:#020617;color:#e2e8f0;margin:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}pre{background:#111827;padding:8px;border-radius:6px;max-height:260px;overflow:auto}li{cursor:pointer}</style></head><body>
<h1>ViaLogic Semantic Workstation</h1><div class="grid"><section><h3>Semantic Lineage Viewer</h3><ul id="nodes"></ul><h3>Contradiction Inspector</h3><pre id="contra"></pre></section><section><h3>Invariant Explorer</h3><pre id="inv"></pre><h3>Replay Graph Viewer</h3><pre id="replay"></pre></section></div>
<script type="module">const $=id=>document.getElementById(id);async function load(p,d){try{return await fetch(p).then(r=>r.ok?r.json():d)}catch{return d}} async function boot(){const l=await load('./semantic_lineage/semantic_lineage_graph.json',{}),c=await load('./contradictions/contradiction_artifacts.json',[]),i=await load('./continuity_invariants/invariants.json',{}),r=await load('./semantic_replay_vectors/semantic_replay_vectors.json',[]); $('contra').textContent=JSON.stringify(c,null,2); $('inv').textContent=JSON.stringify(i,null,2); $('replay').textContent=JSON.stringify(r,null,2); const ul=$('nodes'); ul.innerHTML=''; (l.nodes||[]).forEach(n=>{const li=document.createElement('li');li.textContent=n.id;li.onclick=()=>$('replay').textContent=JSON.stringify(r.filter(v=>(v.source_nodes||[]).includes(n.id)),null,2); ul.appendChild(li);});} boot();</script>
</body></html>
