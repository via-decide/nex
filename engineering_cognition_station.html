<!doctype html><html><head><meta charset="utf-8"><title>Engineering Cognition Station</title><style>body{font-family:system-ui;background:#020617;color:#e2e8f0;margin:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}pre{background:#111827;padding:8px;border-radius:6px;max-height:260px;overflow:auto}li{cursor:pointer}</style></head><body>
<h1>Engineering Cognition Workstation</h1><div class="grid"><section><h3>Primitive Derivation Viewer</h3><ul id="manifest"></ul><h3>Constraint Evolution Timeline</h3><pre id="pressure"></pre></section><section><h3>Replay Lineage Explorer</h3><pre id="replay"></pre><h3>Engineering DAG Viewer</h3><pre id="dag"></pre></section></div>
<script type="module">const $=id=>document.getElementById(id);async function load(p,d){try{return await fetch(p).then(r=>r.ok?r.json():d)}catch{return d}} async function boot(){const m=await load('./metadata/first_principles_manifest.json',[]), p=await load('./constraint_pressure_maps/constraint_pressure_maps.json',[]), r=await load('./architecture_derivations/architecture_replay.json',[]), d=await load('./engineering_primitives/primitive_derivations.json',[]); $('pressure').textContent=JSON.stringify(p,null,2); $('replay').textContent=JSON.stringify(r,null,2); $('dag').textContent=JSON.stringify(d,null,2); const ul=$('manifest'); ul.innerHTML=''; m.forEach(x=>{const li=document.createElement('li');li.textContent=x.title;li.onclick=async()=>{$('dag').textContent=JSON.stringify(await load(`./engineering_primitives/${x.id}.json`,{}),null,2)};ul.appendChild(li);});} boot();</script>
</body></html>
