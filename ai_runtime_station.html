<!doctype html><html><head><meta charset="utf-8"><title>AI Runtime Station</title><style>body{font-family:system-ui;background:#020617;color:#e2e8f0;margin:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}pre{background:#111827;padding:8px;border-radius:6px;max-height:260px;overflow:auto}li{cursor:pointer}</style></head><body>
<h1>Sovereign AI Runtime Workstation</h1><div class="grid"><section><h3>Runtime Topology Viewer</h3><ul id="manifest"></ul><h3>Replay Divergence Viewer</h3><pre id="divergence"></pre></section><section><h3>Inference Constraint Inspector</h3><pre id="constraints"></pre><h3>Hardware Mapping Viewer</h3><pre id="hardware"></pre></section></div>
<script type="module">const $=id=>document.getElementById(id);async function load(p,d){try{return await fetch(p).then(r=>r.ok?r.json():d)}catch{return d}} async function boot(){const m=await load('./metadata/ai_runtime_manifest.json',[]), g=await load('./ai_divergence_graphs/ai_divergence_graph.json',{nodes:[],edges:[]}), s=await load('./inference_lineage/ai_runtime_manifests.json',[]); $('divergence').textContent=JSON.stringify(g,null,2); $('hardware').textContent=JSON.stringify(s,null,2); const ul=$('manifest'); ul.innerHTML=''; m.forEach(x=>{const li=document.createElement('li');li.textContent=x.title;li.onclick=async()=>{$('constraints').textContent=JSON.stringify(await load(`./memory_constraints/${x.id}.json`,{}),null,2)};ul.appendChild(li);});} boot();</script>
</body></html>
