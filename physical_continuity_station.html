<!doctype html><html><head><meta charset="utf-8"><title>Physical Continuity Station</title><style>body{font-family:system-ui;background:#020617;color:#e2e8f0;margin:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}pre{background:#111827;padding:8px;border-radius:6px;max-height:260px;overflow:auto}li{cursor:pointer}</style></head><body>
<h1>Physical Continuity Workstation</h1><div class="grid"><section><h3>Physical Constraint Viewer</h3><ul id="manifest"></ul><h3>Signal Divergence Explorer</h3><pre id="signal"></pre></section><section><h3>Mathematics Lineage Viewer</h3><pre id="math"></pre><h3>Infrastructure Physics Timeline</h3><pre id="timeline"></pre></section></div>
<script type="module">const $=id=>document.getElementById(id);async function load(p,d){try{return await fetch(p).then(r=>r.ok?r.json():d)}catch{return d}} async function boot(){const m=await load('./metadata/physical_manifest.json',[]), s=await load('./signal_divergence_graphs/signal_divergence_graph.json',{}), t=await load('./physical_divergence_maps/physical_reasoning_replay.json',[]); $('signal').textContent=JSON.stringify(s,null,2); $('timeline').textContent=JSON.stringify(t,null,2); const ul=$('manifest'); ul.innerHTML=''; m.forEach(x=>{const li=document.createElement('li');li.textContent=x.title;li.onclick=async()=>{$('math').textContent=JSON.stringify(await load(`./mathematical_lineage/${x.id}.json`,{}),null,2)};ul.appendChild(li);});} boot();</script>
</body></html>
