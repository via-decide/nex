<!doctype html><html><head><meta charset="utf-8"><title>Industrial Research Station</title><style>body{font-family:system-ui;background:#0b1020;color:#e5e7eb;margin:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}pre{background:#111827;padding:8px;border-radius:6px;max-height:260px;overflow:auto}li{cursor:pointer}</style></head><body>
<h1>Industrial Systems Workstation</h1><div class="grid"><section><h3>Industrial Topology Viewer</h3><ul id="manifest"></ul><h3>Failure Propagation Viewer</h3><pre id="failure"></pre></section><section><h3>Protocol Dependency Inspector</h3><pre id="protocols"></pre><h3>Safety Continuity Viewer</h3><pre id="continuity"></pre></section></div>
<script type="module">const $=id=>document.getElementById(id);async function load(p,d){try{return await fetch(p).then(r=>r.ok?r.json():d)}catch{return d}} async function boot(){const m=await load('./metadata/industrial_manifest.json',[]), f=await load('./industrial_failure_graphs/safety_failure_graph.json',{nodes:[],edges:[]}), c=await load('./industrial_lineage/industrial_replay_manifests.json',[]); $('failure').textContent=JSON.stringify(f,null,2); $('continuity').textContent=JSON.stringify(c,null,2); const ul=$('manifest'); ul.innerHTML=''; m.forEach(x=>{const li=document.createElement('li');li.textContent=x.title;li.onclick=async()=>{$('protocols').textContent=JSON.stringify(await load(`./industrial_protocols/${x.id}.protocols.json`,{}),null,2)};ul.appendChild(li);});} boot();</script>
</body></html>
